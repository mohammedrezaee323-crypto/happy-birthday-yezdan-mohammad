<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Yezdan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma}
body{
height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(-45deg,#0f172a,#1e293b,#7c3aed,#2563eb);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:white;
overflow:hidden;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.2);
}
input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin:15px 0;
text-align:center;
font-size:18px;
}
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
}
#birthday{display:none;text-align:center;max-width:800px;padding:30px}
.msg{font-size:24px;line-height:2}
</style>
</head>
<body>

<div class="card" id="login">
<h1>🎂 Happy Birthday 🎂</h1>
<p>تاریخ تولد خودت رو بزن</p>
<input type="password" id="pass" placeholder="18/3/1390">
<button onclick="checkPass()">ورود</button>
</div>

<div id="birthday">
<h1>🎉 تولدت مبارک یزدان 🎉</h1>
<div class="msg">
تولدت مبارک داداش ❤️🎉<br><br>
۱۶ ساله شدی پیرمرد 😂<br>
امیدوارم امسال هرچی می‌خوای بهش برسی و کلی حال خوب داشته باشی.<br>
خوشحالم که این همه سال رفیق هم بودیم.<br>
مراقب خودت باش و مثل همیشه خفن بمون.<br><br>
❤️ تولدت مبارک رفیق ❤️
</div>
</div>

<script>
function checkPass(){
if(document.getElementById('pass').value==='18/3/1390'){
document.getElementById('login').style.display='none';
document.getElementById('birthday').style.display='block';

let speech=new SpeechSynthesisUtterance(
'تولدت مبارک یزدان. شانزده ساله شدی پیرمرد. امیدوارم امسال هرچی می خواهی بهش برسی و کلی حال خوب داشته باشی. خوشحالم که این همه سال رفیق هم بودیم. مراقب خودت باش و مثل همیشه خفن بمون. تولدت مبارک رفیق.'
);
speech.lang='fa-IR';
speech.rate=0.9;
window.speechSynthesis.speak(speech);

}else{
alert('تاریخ اشتباهه 😅');
}
}
</script>

</body>
</html>
